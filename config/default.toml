# Environment variable overrides (take priority over this file):
#   HOMECMDR_CONFIG   — path to a different config file
#   HOMECMDR_DATA_DIR — base directory for relative database_url paths
#                       e.g. HOMECMDR_DATA_DIR=/var/lib/homecmdr makes
#                       "sqlite://data/homecmdr.db" resolve to
#                       /var/lib/homecmdr/data/homecmdr.db
#   HOMECMDR_MASTER_KEY — master API key (see [auth] section)

[runtime]
event_bus_capacity = 1024

[api]
bind_address = "127.0.0.1:3001"

[api.cors]
enabled = true
allowed_origins = ["http://127.0.0.1:8080"]

[api.rate_limit]
# Set enabled = true to enforce a token-bucket rate limit on write endpoints.
enabled = false
requests_per_second = 100
burst_size = 20

[auth]
# Master key grants the Admin role.  Override at runtime via the
# HOMECMDR_MASTER_KEY environment variable — never commit a real key.
master_key = "change-me-before-use"

[locale]
timezone = "UTC"
latitude = 51.5
longitude = -0.1
home_zone_radius_meters = 100

[logging]
level = "info"

[persistence]
enabled = true
backend = "sqlite"
database_url = "sqlite://data/homecmdr.db"
auto_create = true

[persistence.history]
enabled = true
retention_days = 30
default_query_limit = 200
max_query_limit = 1000

[scenes]
enabled = true
directory = "config/scenes"
watch = false

[automations]
enabled = true
directory = "config/automations"
watch = false

[automations.runner]
# Maximum concurrent executions per automation when mode = "parallel" is used
# without an explicit max in the Lua script.
default_max_concurrent = 8
# Hard ceiling (seconds) on a single automation execution before it is cancelled.
backstop_timeout_secs = 3600

[scripts]
enabled = true
directory = "config/scripts"
watch = false

[telemetry]
enabled = false

[telemetry.selection]
device_ids = []
capabilities = []
adapter_names = []

# Official plugins (elgato-lights, ollama, roku-tv, zigbee2mqtt) are available
# from https://github.com/homecmdr/plugins — install with:
#   homecmdr plugin add elgato-lights
# Config values are prompted automatically during install.

# open_meteo is now served by the WASM plugin (config/plugins/open_meteo.wasm).
# The native compiled-in adapter is deprecated; remove this block once the WASM
# plugin is confirmed working in your environment.
[adapters.open_meteo]
enabled = true
latitude = 51.5
longitude = -0.1
poll_interval_secs = 90

# WASM plugins — drop a <name>.wasm + <name>.plugin.toml pair into the
# plugins directory and set enabled = true to load them at startup.
# Each plugin's [adapters.<name>] config block is forwarded to the plugin's
# init() function as JSON.
[plugins]
enabled   = true
directory = "config/plugins"

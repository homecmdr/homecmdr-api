[runtime]
event_bus_capacity = 1024

[api]
bind_address = "127.0.0.1:3001"

[api.cors]
enabled = true
allowed_origins = ["http://127.0.0.1:8080"]

[locale]
timezone = "UTC"
latitude = 51.5
longitude = -0.1

[logging]
level = "info"

[persistence]
enabled = true
backend = "sqlite"
database_url = "sqlite://data/smart-home.db"
auto_create = true

[persistence.history]
enabled = true
retention_days = 30
default_query_limit = 200
max_query_limit = 1000

[scenes]
enabled = true
directory = "config/scenes"
watch = false

[automations]
enabled = true
directory = "config/automations"
watch = false

[scripts]
enabled = true
directory = "config/scripts"
watch = false

[telemetry]
enabled = false

[telemetry.selection]
device_ids = []
capabilities = []
adapter_names = []

[adapters.open_meteo]
enabled = true
latitude = 51.5
longitude = -0.1
poll_interval_secs = 90

[adapters.elgato_lights]
enabled = true
base_url = "http://127.0.0.1:9123"
poll_interval_secs = 30

[adapters.roku_tv]
enabled = true
ip_address = "192.168.1.114"
poll_interval_secs = 30

[adapters.ollama]
enabled = true
base_url = "http://127.0.0.1:11434"
model = "llava"

[adapters.zigbee2mqtt]
enabled = true
server = "mqtt://127.0.0.1:1883"
base_topic = "zigbee2mqtt"
client_id = "smart-home-zigbee2mqtt"
keepalive_secs = 30
command_timeout_secs = 5

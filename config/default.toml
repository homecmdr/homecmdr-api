[runtime]
event_bus_capacity = 1024

[logging]
level = "info"

[persistence]
enabled = true
backend = "sqlite"
database_url = "sqlite://data/smart-home.db"
auto_create = true

[scenes]
enabled = true
directory = "config/scenes"

[telemetry]
enabled = false

[telemetry.selection]
device_ids = []
capabilities = []
adapter_names = []

[adapters.open_meteo]
enabled = true
latitude = 51.5
longitude = -0.1
poll_interval_secs = 90

[adapters.elgato_lights]
enabled = true
base_url = "http://127.0.0.1:9123"
poll_interval_secs = 30

[adapters.roku_tv]
enabled = true
ip_address = "192.168.1.114"
poll_interval_secs = 30

[adapters.ollama]
enabled = false
base_url = "http://127.0.0.1:11434"
model = "llava"

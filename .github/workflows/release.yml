name: Release

# Triggered when a version tag is pushed.  The workflow builds
# homecmdr-server for all supported targets and creates a GitHub Release
# with the resulting binaries as assets.
#
# To cut a release:
#   git tag v1.2.3 && git push origin v1.2.3
#
# Supported targets:
#   x86_64-unknown-linux-gnu      — built natively on ubuntu-latest
#   aarch64-unknown-linux-gnu     — built natively on ubuntu-24.04-arm
#   armv7-unknown-linux-gnueabihf — cross-compiled via cross + Docker

on:
  push:
    tags:
      - "v[0-9]*"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            use_cross: false

          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      # cross is a Docker-based cross-compilation tool.
      # taiki-e/install-action downloads the pre-built binary — much faster
      # than building it from source with `cargo install`.
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p api

      # LIBSQLITE3_SYS_BUNDLED=1 compiles SQLite from source so the binary
      # has no system libsqlite3 dependency.  Required for cross builds where
      # the cross Docker image may not carry a target-arch libsqlite3-dev.
      - name: Build (cross)
        if: matrix.use_cross
        env:
          LIBSQLITE3_SYS_BUNDLED: "1"
        run: cross build --release --target ${{ matrix.target }} -p api

      - name: Prepare binary
        run: |
          cp target/${{ matrix.target }}/release/api \
             homecmdr-server-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecmdr-server-${{ matrix.target }}
          path: homecmdr-server-${{ matrix.target }}

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: List binaries
        run: ls -lh binaries/

      # If a draft release was pre-created for this tag (e.g. via the GitHub
      # UI), upload to it; otherwise create a new published release.
      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets..."
            gh release upload "$TAG" binaries/homecmdr-server-* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              binaries/homecmdr-server-* \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --generate-notes \
              --target main
          fi
